<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GestureDrive - Phase 02</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #04080f;
      --panel:   #080f1a;
      --border:  #0f2236;
      --accent:  #00d4ff;
      --green:   #00ff9d;
      --red:     #ff3d5a;
      --dim:     #1e4060;
      --text:    #a8d8ea;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 효과 (Grid & Scanline) */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px);
      pointer-events: none; z-index: 999;
    }

    .shell {
      position: relative; z-index: 1;
      max-width: 1280px; margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1.2rem;
      min-height: 100vh;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem; font-weight: 900;
      letter-spacing: 6px; color: var(--accent);
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
    }
    .logo em { color: var(--green); font-style: normal; }

    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0.8rem;
    }

    /* VIDEO PANEL */
    .video-panel {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: #000;
    }
    .video-panel::before {
      content: 'CAR LIVE CAMERA';
      position: absolute; top: 12px; left: 14px; z-index: 2;
      font-size: 0.6rem; letter-spacing: 3px; color: var(--green);
    }
    .video-panel img {
      width: 100%; display: block;
      filter: contrast(1.1) brightness(0.9);
    }

    /* UI DECO ELEMENTS */
    .corner { position: absolute; width: 18px; height: 18px; z-index: 3; }
    .corner.tl { top: 6px; left: 6px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner.br { bottom: 6px; right: 6px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    /* SIDE PANEL */
    .side { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.1rem;
      position: relative;
    }
    .card-title {
      font-size: 0.6rem; letter-spacing: 3px;
      color: var(--dim); margin-bottom: 0.9rem; text-transform: uppercase;
    }

    .btn-nav {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-nav:hover {
      background: rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
      transform: translateY(-2px);
    }

    footer {
      border-top: 1px solid var(--border);
      padding-top: 0.8rem;
      display: flex; justify-content: space-between;
      font-size: 0.6rem; letter-spacing: 2px; color: var(--dim);
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">LIVE<em>CAMERA</em></div>
    <div class="badge on">● SOCKET ACTIVE</div>
  </header>

  <div class="main">
    <div class="video-panel">
      <div class="corner tl"></div>
      <div class="corner br"></div>
      <img src="{{ url_for('video_feed2') }}" alt="Secondary Feed"/>
    </div>

    <!-- SIDE PANEL에 상태 카드 추가 -->
    <div class="side">
      <div class="card">
        <div class="card-title">// CHANNEL INFO</div>
        <p style="font-size: 0.8rem; color: var(--accent);">REMOTE SOURCE: CONNECTED</p>
        <p style="font-size: 0.7rem; margin-top: 5px; color: var(--dim);">PROTOCOL: TCP/IP SOCKET</p>
      </div>

      <!-- 추가: 차량 상태 카드 -->
      <div class="card">
        <div class="card-title">// VEHICLE STATE</div>
        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 0.8rem;">
          <div>
            <div style="font-size: 0.55rem; letter-spacing: 2px; color: var(--dim);">COMMAND</div>
            <div id="vCommand" style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--accent); margin-top: 4px;">—</div>
          </div>
          <div>
            <div style="font-size: 0.55rem; letter-spacing: 2px; color: var(--dim);">SPEED</div>
            <div id="vSpeed" style="font-family: 'Orbitron', sans-serif; font-size: 1.2rem; color: var(--green); margin-top: 4px;">—</div>
          </div>
          <div>
            <div style="font-size: 0.55rem; letter-spacing: 2px; color: var(--dim);">STATUS</div>
            <div id="vStatus" style="font-size: 0.75rem; color: var(--text); margin-top: 4px;">—</div>
          </div>
          <div>
            <div style="font-size: 0.55rem; letter-spacing: 2px; color: var(--dim);">MODE</div>
            <div id="vMock" style="font-size: 0.75rem; margin-top: 4px;">—</div>
          </div>
        </div>
        <div style="margin-top: 0.8rem; padding-top: 0.8rem; border-top: 1px solid var(--border);">
          <div style="font-size: 0.55rem; letter-spacing: 2px; color: var(--dim);">LAST UPDATED</div>
          <div id="vTimestamp" style="font-size: 0.65rem; color: var(--dim); margin-top: 4px;">—</div>
        </div>
      </div>
      <!-- 명령 전송 카드 -->
      <div class="card">
        <div class="card-title">// SEND COMMAND</div>
        
        <!-- 명령 선택 -->
        <div style="margin-bottom: 0.8rem;">
          <div style="font-size: 0.55rem; letter-spacing: 2px; color: var(--dim); margin-bottom: 6px;">COMMAND</div>
          <select id="cmdSelect" style="width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--accent); font-family: 'JetBrains Mono', monospace; padding: 8px; border-radius: 3px;">
            <option value="FOR">FORWARD</option>
            <option value="BAK">BACKWARD</option>
            <option value="LFT">LEFT</option>
            <option value="RIT">RIGHT</option>
            <option value="SPN">SPIN</option>
            <option value="STP">STOP</option>
          </select>
        </div>

        <!-- 초 입력 -->
        <div style="margin-bottom: 0.8rem;">
          <div style="font-size: 0.55rem; letter-spacing: 2px; color: var(--dim); margin-bottom: 6px;">DURATION (SEC)</div>
          <input id="cmdDuration" type="number" value="1.0" min="0.1" max="10" step="0.1"
            style="width: 100%; background: var(--bg); border: 1px solid var(--border); color: var(--green); font-family: 'Orbitron', monospace; padding: 8px; border-radius: 3px; font-size: 1rem;"/>
        </div>

        <!-- 전송 버튼 -->
        <button id="cmdSendBtn" onclick="sendTimedCommand()"
          style="width: 100%; padding: 0.8rem; background: transparent; border: 1px solid var(--accent); color: var(--accent); font-family: 'Orbitron', sans-serif; font-weight: 700; letter-spacing: 2px; cursor: pointer; transition: all 0.3s; border-radius: 3px;">
          ▶ EXECUTE
        </button>

        <!-- 결과 표시 -->
        <div id="cmdResult" style="margin-top: 0.6rem; font-size: 0.65rem; color: var(--dim); min-height: 1rem;"></div>
      </div>
      <div class="card" style="border-color: var(--red);">
        <div class="card-title">// NAVIGATION</div>
        <button class="btn-nav" onclick="location.href='/'" style="border-color: var(--red); color: var(--red);">
          RETURN TO MAIN PHASE
        </button>
      </div>
    </div>
  </div>

  <footer>
    <span>REMOTE_STREAM_SRV_v2.0</span>
    <span id="clock">00:00:00</span>
  </footer>

</div>

<script>
  // 시계 기능
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
  }, 1000);
   setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('ko-KR', { hour12: false });
  }, 1000);

  // 차량 상태 폴링
  setInterval(async () => {
    try {
      const res = await fetch('/api/vehicle_state');
      const s = await res.json();
      if (!s || Object.keys(s).length === 0) return;

      document.getElementById('vCommand').textContent =
        s.current_command || 'IDLE';

      document.getElementById('vSpeed').textContent =
        s.speed !== undefined ? s.speed.toFixed(2) : '—';

      document.getElementById('vStatus').textContent =
        s.status || '—';

      const mockEl = document.getElementById('vMock');
      if (s.mock_mode) {
        mockEl.textContent = 'MOCK';
        mockEl.style.color = 'var(--yellow, #ffd93d)';
      } else {
        mockEl.textContent = 'GPIO';
        mockEl.style.color = 'var(--green)';
      }

      document.getElementById('vTimestamp').textContent =
        s.timestamp || '—';

    } catch(e) {
      console.error('상태 조회 실패:', e);
    }
  }, 200); // 200ms 폴링
async function sendTimedCommand() {
  const cmd = document.getElementById('cmdSelect').value;
  const duration = parseFloat(document.getElementById('cmdDuration').value);
  const btn = document.getElementById('cmdSendBtn');
  const result = document.getElementById('cmdResult');

  btn.textContent = '⏳ EXECUTING...';
  btn.style.borderColor = 'var(--yellow, #ffd93d)';
  btn.style.color = 'var(--yellow, #ffd93d)';
  btn.disabled = true;

  try {
    const res = await fetch('/api/execute_for', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ command: cmd, duration: duration })
    });
    const data = await res.json();
    result.textContent = data.blocked
      ? `🚫 BLOCKED: ${data.reason}`
      : `✅ ${data.executed} × ${data.duration}s`;
    result.style.color = data.blocked ? 'var(--red)' : 'var(--green)';
  } catch(e) {
    result.textContent = '⚠️ 통신 실패';
    result.style.color = 'var(--red)';
  } finally {
    btn.textContent = '▶ EXECUTE';
    btn.style.borderColor = 'var(--accent)';
    btn.style.color = 'var(--accent)';
    btn.disabled = false;
  }
}
</script>
</body>
</html>
