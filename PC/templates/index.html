<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GestDrive Dashboard</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet"/>
  <!-- Socket.IO 추가 -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
  <style>
    :root {
      --bg: #050a0e;
      --panel: #0b1520;
      --border: #1a3a4a;
      --accent: #00e5ff;
      --accent2: #ff6b35;
      --text: #cde8f0;
      --dim: #3a6070;
      --green: #00ff88;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Rajdhani', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,229,255,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,229,255,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }

    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 2.5rem;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1.2rem;
    }

    .logo {
      font-family: 'Share Tech Mono', monospace;
      font-size: 1.6rem;
      color: var(--accent);
      letter-spacing: 2px;
    }
    .logo span { color: var(--accent2); }

    .badge {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--green);
      border: 1px solid var(--green);
      padding: 2px 8px;
      border-radius: 2px;
      animation: blink 2s infinite;
    }
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 1.2rem;
      margin-bottom: 1.5rem;
    }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.4rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.3s;
    }
    .card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, var(--accent), transparent);
    }
    .card.flash { border-color: var(--accent); }

    .card-label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.7rem;
      color: var(--dim);
      letter-spacing: 2px;
      margin-bottom: 0.6rem;
    }
    .card-value {
      font-size: 2rem;
      font-weight: 700;
      color: var(--accent);
      transition: color 0.2s;
    }
    .card-value.highlight { color: var(--green); }
    .card-sub {
      font-size: 0.85rem;
      color: var(--dim);
      margin-top: 0.3rem;
    }

    .status-dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--green);
      margin-right: 6px;
      box-shadow: 0 0 8px var(--green);
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.3); opacity: 0.7; }
    }

    /* 제스처 큰 표시 */
    .gesture-display {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2rem;
      text-align: center;
      margin-bottom: 1.5rem;
      transition: border-color 0.3s;
    }
    .gesture-display.active { border-color: var(--accent); }

    .gesture-key {
      font-family: 'Share Tech Mono', monospace;
      font-size: 4rem;
      color: var(--accent);
      display: block;
      margin-bottom: 0.5rem;
      transition: transform 0.15s;
    }
    .gesture-key.pop { animation: pop 0.2s ease; }
    @keyframes pop {
      0%   { transform: scale(1); }
      50%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }

    .gesture-name {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--green);
      letter-spacing: 2px;
    }
    .gesture-cmd {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.85rem;
      color: var(--dim);
      margin-top: 0.3rem;
    }

    .log-panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.2rem;
    }
    .log-header {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.75rem;
      color: var(--dim);
      letter-spacing: 2px;
      margin-bottom: 0.8rem;
    }
    .log-body {
      font-family: 'Share Tech Mono', monospace;
      font-size: 0.8rem;
      height: 160px;
      overflow-y: auto;
      color: #5a8a9a;
    }
    .log-body p { margin-bottom: 0.3rem; }
    .log-body p span { color: var(--accent); }
    .log-body p.ok span { color: var(--green); }
    .log-body p.err span { color: var(--accent2); }

    .btn-row {
      display: flex;
      gap: 0.8rem;
      margin-top: 1.2rem;
    }
    button {
      font-family: 'Rajdhani', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      letter-spacing: 1px;
      padding: 0.6rem 1.4rem;
      border-radius: 3px;
      border: none;
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-primary { background: var(--accent); color: var(--bg); }
    .btn-primary:hover { filter: brightness(1.2); }
    .btn-secondary { background: transparent; color: var(--accent); border: 1px solid var(--accent); }
    .btn-secondary:hover { background: rgba(0,229,255,0.08); }
  </style>
</head>
<body>
<div class="container">
  <header>
    <div class="logo">GEST<span>DRIVE</span></div>
    <div class="badge">● LIVE</div>
  </header>

  <!-- 제스처 메인 표시 -->
  <div class="gesture-display" id="gestureDisplay">
    <span class="gesture-key" id="gestureKey">—</span>
    <div class="gesture-name" id="gestureName">WAITING...</div>
    <div class="gesture-cmd" id="gestureCmd">HID 입력 대기 중</div>
  </div>

  <div class="grid">
    <div class="card">
      <div class="card-label">SERVER STATUS</div>
      <div class="card-value" id="statusVal">—</div>
      <div class="card-sub"><span class="status-dot"></span>Flask Running</div>
    </div>
    <div class="card">
      <div class="card-label">LAST KEY</div>
      <div class="card-value" id="lastKey">—</div>
      <div class="card-sub">HID Input</div>
    </div>
    <div class="card">
      <div class="card-label">COMMAND</div>
      <div class="card-value" id="cmdVal">—</div>
      <div class="card-sub">Motor Control</div>
    </div>
    <div class="card">
      <div class="card-label">TOTAL COUNT</div>
      <div class="card-value" id="countVal">0</div>
      <div class="card-sub">Received</div>
    </div>
  </div>

  <div class="log-panel">
    <div class="log-header">// SYSTEM LOG</div>
    <div class="log-body" id="logBox">
      <p><span>[INIT]</span> Dashboard loaded</p>
    </div>
    <div class="btn-row">
      <button class="btn-primary" onclick="checkStatus()">STATUS CHECK</button>
      <button class="btn-secondary" onclick="sendTest()">SEND TEST</button>
    </div>
  </div>
</div>

<script>
  // ── Socket.IO 연결 ──────────────────────────────────
  const socket = io();
  let count = 0;

  socket.on('connect', () => {
    addLog('<span>[WS]</span> Socket.IO 연결됨', 'ok');
  });

  socket.on('disconnect', () => {
    addLog('<span>[WS]</span> Socket.IO 연결 끊김', 'err');
  });

  // ── 제스처 수신 → 화면 업데이트 ────────────────────
  socket.on('gesture', (data) => {
    count++;

    const keyEl  = document.getElementById('gestureKey');
    const dispEl = document.getElementById('gestureDisplay');

    // 키 팝 애니메이션
    keyEl.classList.remove('pop');
    void keyEl.offsetWidth;
    keyEl.classList.add('pop');
    dispEl.classList.add('active');

    keyEl.textContent = data.key?.toUpperCase() || '?';
    document.getElementById('gestureName').textContent = data.gesture || '—';
    document.getElementById('gestureCmd').textContent  = `CMD: ${data.cmd || '—'}`;
    document.getElementById('lastKey').textContent     = data.key?.toUpperCase() || '—';
    document.getElementById('cmdVal').textContent      = data.cmd || '—';
    document.getElementById('countVal').textContent    = count;

    addLog(`<span>[HID]</span> key=${data.key} → gesture=${data.gesture} → cmd=${data.cmd}`, 'ok');
  });

  // ── 유틸 ────────────────────────────────────────────
  function addLog(msg, type = '') {
    const box = document.getElementById('logBox');
    const p   = document.createElement('p');
    p.className = type;
    p.innerHTML = msg;
    box.appendChild(p);
    box.scrollTop = box.scrollHeight;
  }

  async function checkStatus() {
    try {
      const res  = await fetch('/api/status');
      const data = await res.json();
      document.getElementById('statusVal').textContent = data.status.toUpperCase();
      addLog(`<span>[GET]</span> /api/status → ${JSON.stringify(data)}`, 'ok');
    } catch(e) {
      addLog(`<span>[ERR]</span> ${e.message}`, 'err');
    }
  }

  async function sendTest() {
    try {
      const res  = await fetch('/api/data', {
        method : 'POST',
        headers: { 'Content-Type': 'application/json' },
        body   : JSON.stringify({ key: 'w', gesture: 'FIST', cmd: 'FORWARD' })
      });
      const data = await res.json();
      addLog(`<span>[POST]</span> /api/data → ${data.result}`, 'ok');
    } catch(e) {
      addLog(`<span>[ERR]</span> ${e.message}`, 'err');
    }
  }

  checkStatus();
</script>
</body>
</html>
