<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GestureDrive - Phase 02</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #04080f;
      --panel:   #080f1a;
      --border:  #0f2236;
      --accent:  #00d4ff;
      --green:   #00ff9d;
      --red:     #ff3d5a;
      --dim:     #1e4060;
      --text:    #a8d8ea;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* 배경 효과 (Grid & Scanline) */
    body::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px; pointer-events: none;
    }
    body::after {
      content: ''; position: fixed; inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,212,255,0.015) 2px, rgba(0,212,255,0.015) 4px);
      pointer-events: none; z-index: 999;
    }

    .shell {
      position: relative; z-index: 1;
      max-width: 1280px; margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1.2rem;
      min-height: 100vh;
    }

    header {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem; font-weight: 900;
      letter-spacing: 6px; color: var(--accent);
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
    }
    .logo em { color: var(--green); font-style: normal; }

    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0.8rem;
    }

    /* VIDEO PANEL */
    .video-panel {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: #000;
    }
    .video-panel::before {
      content: 'CAR LIVE CAMERA';
      position: absolute; top: 12px; left: 14px; z-index: 2;
      font-size: 0.6rem; letter-spacing: 3px; color: var(--green);
    }
    .video-panel img {
      width: 100%; display: block;
      filter: contrast(1.1) brightness(0.9);
    }

    /* UI DECO ELEMENTS */
    .corner { position: absolute; width: 18px; height: 18px; z-index: 3; }
    .corner.tl { top: 6px; left: 6px; border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner.br { bottom: 6px; right: 6px; border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    /* SIDE PANEL */
    .side { display: flex; flex-direction: column; gap: 1rem; }
    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.1rem;
      position: relative;
    }
    .card-title {
      font-size: 0.6rem; letter-spacing: 3px;
      color: var(--dim); margin-bottom: 0.9rem; text-transform: uppercase;
    }

    .btn-nav {
      width: 100%;
      padding: 1rem;
      background: transparent;
      border: 1px solid var(--accent);
      color: var(--accent);
      font-family: 'Orbitron', sans-serif;
      font-weight: 700;
      letter-spacing: 2px;
      cursor: pointer;
      transition: all 0.3s;
    }
    .btn-nav:hover {
      background: rgba(0, 212, 255, 0.1);
      box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
      transform: translateY(-2px);
    }

    footer {
      border-top: 1px solid var(--border);
      padding-top: 0.8rem;
      display: flex; justify-content: space-between;
      font-size: 0.6rem; letter-spacing: 2px; color: var(--dim);
    }
  </style>
</head>
<body>
<div class="shell">

  <header>
    <div class="logo">LIVE<em>CAMERA</em></div>
    <div class="badge on">● SOCKET ACTIVE</div>
  </header>

  <div class="main">
    <div class="video-panel">
      <div class="corner tl"></div>
      <div class="corner br"></div>
      <img src="{{ url_for('video_feed2') }}" alt="Secondary Feed"/>
    </div>

    <div class="side">
      <div class="card">
        <div class="card-title">// CHANNEL INFO</div>
        <p style="font-size: 0.8rem; color: var(--accent);">REMOTE SOURCE: CONNECTED</p>
        <p style="font-size: 0.7rem; margin-top: 5px; color: var(--dim);">PROTOCOL: TCP/IP SOCKET</p>
      </div>

      <div class="card" style="border-color: var(--red);">
        <div class="card-title">// NAVIGATION</div>
        <button class="btn-nav" onclick="location.href='/'" style="border-color: var(--red); color: var(--red);">
          RETURN TO MAIN PHASE
        </button>
      </div>
    </div>
  </div>

  <footer>
    <span>REMOTE_STREAM_SRV_v2.0</span>
    <span id="clock">00:00:00</span>
  </footer>

</div>

<script>
  // 시계 기능
  setInterval(() => {
    document.getElementById('clock').textContent = new Date().toLocaleTimeString('ko-KR', { hour12: false });
  }, 1000);
</script>
</body>
</html>
