<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GestureDrive</title>
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=JetBrains+Mono:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:      #04080f;
      --panel:   #080f1a;
      --border:  #0f2236;
      --accent:  #00d4ff;
      --green:   #00ff9d;
      --red:     #ff3d5a;
      --yellow:  #ffd93d;
      --dim:     #1e4060;
      --text:    #a8d8ea;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'JetBrains Mono', monospace;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* scanline overlay */
    body::after {
      content: '';
      position: fixed; inset: 0;
      background: repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(0,212,255,0.015) 2px,
        rgba(0,212,255,0.015) 4px
      );
      pointer-events: none;
      z-index: 999;
    }

    /* grid bg */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
    }

    /* ── LAYOUT ─────────────────────────── */
    .shell {
      position: relative; z-index: 1;
      max-width: 1280px; margin: 0 auto;
      padding: 1.5rem;
      display: grid;
      grid-template-rows: auto 1fr auto;
      gap: 1.2rem;
      min-height: 100vh;
    }

    /* ── HEADER ─────────────────────────── */
    header {
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1rem;
    }
    .logo {
      font-family: 'Orbitron', sans-serif;
      font-size: 1.6rem; font-weight: 900;
      letter-spacing: 6px; color: var(--accent);
      text-shadow: 0 0 20px rgba(0,212,255,0.5);
    }
    .logo em { color: var(--green); font-style: normal; }

    .status-bar { display: flex; gap: 1rem; align-items: center; }
    .badge {
      font-size: 0.65rem; letter-spacing: 2px; padding: 4px 12px;
      border: 1px solid var(--dim); border-radius: 2px; color: var(--dim);
      transition: all 0.3s;
    }
    .badge.on  { border-color: var(--green); color: var(--green); box-shadow: 0 0 10px rgba(0,255,157,0.25); }
    .badge.err { border-color: var(--red);   color: var(--red); }

    /* ── MAIN GRID ──────────────────────── */
    .main {
      display: grid;
      grid-template-columns: 1fr 340px;
      gap: 0.8rem;
    }

    /* ── VIDEO PANEL ────────────────────── */
    .video-panel {
      position: relative;
      border: 1px solid var(--border);
      border-radius: 4px;
      overflow: hidden;
      background: #000;
    }
    /* .video-panel::before {
      content: 'LIVE FEED';
      position: absolute; top: 12px; left: 14px; z-index: 2;
      font-size: 0.6rem; letter-spacing: 3px; color: var(--red);
      animation: blink 1.2s step-end infinite;
    } */
    .video-panel::after {
      content: '';
      position: absolute; inset: 0;
      border: 2px solid transparent;
      border-image: linear-gradient(135deg, var(--accent), transparent 60%) 1;
      pointer-events: none;
    }
    @keyframes blink { 50% { opacity: 0; } }

    .video-panel img {
      width: 100%; display: block;
      filter: contrast(1.05) saturate(0.9);
    }

    /* corner deco */
    .corner { position: absolute; width: 18px; height: 18px; z-index: 3; }
    .corner.tl { top: 6px;    left: 6px;    border-top: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner.tr { top: 6px;    right: 6px;   border-top: 2px solid var(--accent); border-right: 2px solid var(--accent); }
    .corner.bl { bottom: 6px; left: 6px;    border-bottom: 2px solid var(--accent); border-left: 2px solid var(--accent); }
    .corner.br { bottom: 6px; right: 6px;   border-bottom: 2px solid var(--accent); border-right: 2px solid var(--accent); }

    /* ── SIDE PANEL ─────────────────────── */
    .side { display: flex; flex-direction: column; gap: 1rem; }

    .card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1.1rem 1.3rem;
      position: relative; overflow: hidden;
    }
    .card::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, var(--accent), transparent);
    }
    .card-title {
      font-size: 0.6rem; letter-spacing: 3px;
      color: var(--dim); margin-bottom: 0.9rem; text-transform: uppercase;
    }

    /* gesture display */
    .gesture-big {
      font-family: 'Orbitron', sans-serif;
      font-size: 5rem; font-weight: 900;
      color: var(--accent); text-align: center;
      line-height: 1;
      text-shadow: 0 0 30px rgba(0,212,255,0.6);
      transition: all 0.15s;
      min-height: 6rem; display: flex; align-items: center; justify-content: center;
    }
    .gesture-big.pop { animation: pop 0.2s ease; }
    @keyframes pop {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.3); }
      100% { transform: scale(1); }
    }
    .gesture-label {
      text-align: center; font-size: 0.75rem; letter-spacing: 3px;
      color: var(--green); margin-top: 0.4rem;
    }

    /* mode indicators */
    .modes { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 0.5rem; }
    .mode-btn {
      padding: 0.6rem 0.3rem; text-align: center;
      border: 1px solid var(--border); border-radius: 3px;
      font-size: 0.6rem; letter-spacing: 1.5px; color: var(--dim);
      transition: all 0.25s; cursor: default;
    }
    .mode-btn.active-i { border-color: var(--green); color: var(--green); background: rgba(0,255,157,0.06); box-shadow: 0 0 12px rgba(0,255,157,0.2); }
    .mode-btn.active-d { border-color: var(--red);   color: var(--red);   background: rgba(255,61,90,0.06);  box-shadow: 0 0 12px rgba(255,61,90,0.2); }
    .mode-btn.active-u { border-color: var(--yellow); color: var(--yellow); background: rgba(255,217,61,0.06); box-shadow: 0 0 12px rgba(255,217,61,0.2); }

    .mode-key {
      display: block; font-size: 1rem; font-weight: 600;
      font-family: 'Orbitron', sans-serif; margin-bottom: 3px;
    }

    /* stats row */
    .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 0.6rem; }
    .stat { text-align: center; }
    .stat-val {
      font-family: 'Orbitron', sans-serif; font-size: 1.4rem;
      font-weight: 700; color: var(--accent);
    }
    .stat-label { font-size: 0.55rem; letter-spacing: 2px; color: var(--dim); margin-top: 2px; }

    /* log */
    .log-body {
      height: 130px; overflow-y: auto; font-size: 0.7rem;
      line-height: 1.7; color: var(--dim);
    }
    .log-body::-webkit-scrollbar { width: 3px; }
    .log-body::-webkit-scrollbar-thumb { background: var(--dim); }
    .log-entry { display: flex; gap: 8px; }
    .log-ts  { color: #1a3a50; flex-shrink: 0; }
    .log-key { color: var(--accent); }
    .log-mode{ color: var(--green); }

    /* keyboard hint */
    .kb { display: grid; grid-template-columns: repeat(3, 1fr); gap: 4px; }
    .key {
      border: 1px solid var(--border); border-radius: 3px;
      padding: 4px; text-align: center; font-size: 0.6rem; color: var(--dim);
    }
    .key span { display: block; font-family: 'Orbitron', sans-serif; font-size: 0.75rem; color: var(--text); }

    /* ── FOOTER ─────────────────────────── */
    footer {
      border-top: 1px solid var(--border);
      padding-top: 0.8rem;
      display: flex; justify-content: space-between; align-items: center;
      font-size: 0.6rem; letter-spacing: 2px; color: var(--dim);
    }

    @media (max-width: 900px) {
      .main { grid-template-columns: 1fr; }
      .side { flex-direction: row; flex-wrap: wrap; }
      .side .card { flex: 1 1 200px; }
    }

    #modeReset:hover {
      background: rgba(255, 61, 90, 0.2) !important;
      box-shadow: 0 0 15px rgba(255, 61, 90, 0.4) !important;
      color: #fff !important;
    }

    .action-bar {
      padding: 15px;
      background: rgba(0, 0, 0, 0.5); /* 패널 배경 */
    }

    .label {
      display: block;
      margin-bottom: 10px;
      font-size: 14px;
      color: #a0c4ff;
      letter-spacing: 2px;
    }

    /* 2행 4열 그리드 설정 */
    .action-grid-container {
      display: grid;
      grid-template-columns: repeat(4, 1fr); /* 4열 동일 비율 */
      grid-template-rows: repeat(2, 60px);   /* 2행 높이 지정 */
      gap: 10px;                             /* 버튼 사이 간격 */
      max-width: 600px;                      /* 너무 퍼지지 않게 너비 제한 */
    }

    /* 버튼 기본 스타일 확장 */
    .action-btn {
      background: rgba(10, 25, 40, 0.8);
      border: 1px solid #1a3a4a;
      color: #4da6ff;
      font-family: 'Courier New', monospace;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      text-transform: uppercase;
    }

    /* 활성화(Active) 및 호버 효과 */
    .action-btn:hover {
      border-color: #00ffff;
      background: rgba(0, 255, 255, 0.05);
    }

    .action-btn.active {
      border-color: #00ffff;
      color: #00ffff;
      background: rgba(0, 255, 255, 0.15);
      box-shadow: inset 0 0 10px rgba(0, 255, 255, 0.2), 0 0 5px rgba(0, 255, 255, 0.5);
    }

    /* STOP 및 특수 버튼 색상 */
    .action-btn.stop { color: #ff4d4d; border-color: #4a1a1a; }
    .action-btn.stop.active { border-color: #ff0000; color: #ff0000; box-shadow: 0 0 10px rgba(255,0,0,0.4); }
  </style>
</head>
<body>
<div class="shell">

  <!-- HEADER -->
  <header>
    <div class="logo">GESTURE<em>DRIVE</em></div>
    <div class="status-bar">
      <div class="badge" id="connBadge">● OFFLINE</div>
      <div class="badge" id="modeBadge">STANDBY</div>
    </div>
  </header>

  <!-- MAIN -->
  <div class="main">

    <!-- VIDEO -->
    <div class="video-panel">
      <div class="corner tl"></div>
      <div class="corner tr"></div>
      <div class="corner bl"></div>
      <div class="corner br"></div>
      <img src="/video_feed" alt="camera feed"/>
      
      <div class="action-bar">
        <span class="label">SET ACTION</span>
        <div class="action-grid-container">
          <button class="action-btn active" onclick="sendAction('FOR')">FORWARD</button>
          <!-- <button class="action-btn" onclick="sendAction('LFT')">LEFT</button> -->
          <button class="action-btn stop" onclick="sendAction('STP')">STOP</button>
          <!-- <button class="action-btn" onclick="sendAction('RIT')">RIGHT</button> -->
          
          <button class="action-btn" onclick="sendAction('BAK')">BACKWARD</button>
          
          <button class="action-btn" onclick="sendAction('FST')">SPEED (+)</button>
          <button class="action-btn" onclick="sendAction('SLW')">SPEED (-)</button>
          <button class="action-btn" onclick="sendAction('SPN')">SPIN</button>
        </div>
      </div>
    </div>
    <!-- SIDE -->
    <div class="side">

      <!-- GESTURE -->
      <div class="card">
        <div class="card-title">// DETECTED GESTURE</div>
        <div class="gesture-big" id="gestureChar">—</div>
        <div class="gesture-label" id="gestureLabel">WAITING FOR INPUT</div>
      </div>

      <!-- MODE -->
      <!-- Button -->
      <div class="card" style="position: relative; z-index: 10;"> <div class="card-title">// SYSTEM FLAGS</div>
        <div class="modes">
          <div class="mode-btn" id="modeI" style="cursor:pointer; pointer-events: auto;">
            <span class="mode-key">I</span>INSERT
          </div>
          <div class="mode-btn" id="modeD" style="cursor:pointer; pointer-events: auto;">
            <span class="mode-key">D</span>DELETE
          </div>
          <div class="mode-btn" id="modeU" style="cursor:pointer; pointer-events: auto;">
            <span class="mode-key">U</span>UPDATE
          </div>
        </div>
        
        <button id="modeReset" class="mode-btn" style="width: 100%; margin-top: 10px; cursor: pointer; border-color: var(--red); color: var(--red); background: rgba(255, 61, 90, 0.05);">
          <span class="mode-key">-</span> RESET (STANDBY)
        </button>
      </div>

      <!-- STATS -->
      <div class="card">
        <div class="card-title">// SESSION STATS</div>
        <div class="stats">
          <div class="stat">
            <div class="stat-val" id="totalCount">0</div>
            <div class="stat-label">TOTAL DETECTED</div>
          </div>
          <div class="stat">
            <div class="stat-val" id="fps">—</div>
            <div class="stat-label">UPDATES/SEC</div>
          </div>
        </div>
      </div>

      

      <!-- LOG -->
      <div class="card">
        <div class="card-title">// EVENT LOG</div>
        <div class="log-body" id="logBox"></div>
      </div>

      <div class="card" style="border-color: var(--accent); background: rgba(0, 212, 255, 0.05);">
        <div class="card-title">// NAVIGATION</div>
          <a href="/index2" style="text-decoration: none; display: block;">
            <button id="nextPageBtn" class="action-btn" style="width: 100%; height: 50px; border-color: var(--accent); color: var(--accent);">
              LIVE CAMERA ➔
            </button>
          </a> 
      </div>
      
    </div>
  </div>

  <!-- FOOTER -->
  <footer>
    <span>RASPBERRY PI 5 · MEDIAPIPE · KNN · FLASK</span>
    <span id="clock">--:--:--</span>
  </footer>

</div>

<script>
  let total = 0;
  let updateCount = 0;
  let lastUpdate = Date.now();
  let currentMode = 'STANDBY';
  let lastGesture = '';

  // clock
  setInterval(() => {
    document.getElementById('clock').textContent =
      new Date().toLocaleTimeString('ko-KR', { hour12: false });
  }, 1000);

  // fps counter
  setInterval(() => {
    const fps = updateCount;
    updateCount = 0;
    document.getElementById('fps').textContent = fps;
  }, 1000);

  function ts() {
    return new Date().toLocaleTimeString('ko-KR', { hour12: false });
  }

  function addLog(gesture, mode) {
    const box = document.getElementById('logBox');
    const d = document.createElement('div');
    d.className = 'log-entry';
    d.innerHTML = `<span class="log-ts">[${ts()}]</span><span class="log-key">${gesture.toUpperCase()}</span><span class="log-mode">${mode}</span>`;
    box.prepend(d);
    if (box.children.length > 50) box.lastChild.remove();
  }

  function setMode(mode) {
    document.getElementById('modeI').className = 'mode-btn' + (mode === 'INSERT' ? ' active-i' : '');
    document.getElementById('modeD').className = 'mode-btn' + (mode === 'DELETE' ? ' active-d' : '');
    document.getElementById('modeU').className = 'mode-btn' + (mode === 'UPDATE' ? ' active-u' : '');

    const badge = document.getElementById('modeBadge');
    badge.textContent = mode;
    badge.className = 'badge' + (mode !== 'STANDBY' ? ' on' : '');
    currentMode = mode;
  }

  // polling gesture
  setInterval(async () => {
    try {
      const res  = await fetch('/api/gesture');
      const data = await res.json();

      // connection badge
      const conn = document.getElementById('connBadge');
      conn.textContent = '● ONLINE';
      conn.className = 'badge on';

      updateCount++;

      if (data.gesture && data.gesture !== lastGesture) {
        lastGesture = data.gesture;
        total++;
        document.getElementById('totalCount').textContent = total;

        const el = document.getElementById('gestureChar');
        el.classList.remove('pop');
        void el.offsetWidth;
        el.classList.add('pop');
        el.textContent = data.gesture.toUpperCase();
        document.getElementById('gestureLabel').textContent =
          `CHAR: ${data.gesture.toUpperCase()}  ·  ASCII: ${data.gesture.charCodeAt(0)}`;

        addLog(data.gesture, currentMode);
      }

      // mode sync
      if (data.mode) setMode(data.mode);

    } catch(e) {
      const conn = document.getElementById('connBadge');
      conn.textContent = '● OFFLINE';
      conn.className = 'badge err';
    }
  }, 100);

  // flag를 조정하는 버튼 함수 
  document.addEventListener('DOMContentLoaded', () => {
  const modeControls = {
    'modeI': 'i',
    'modeD': 'd',
    'modeU': 'u',
    'modeReset': 'reset'
  };

  Object.keys(modeControls).forEach(id => {
    const el = document.getElementById(id);
    if (el) {
      el.onclick = async function() { // addEventListener 대신 직접 할당
        const action = modeControls[id];
        console.log("클릭됨:", action); 

        try {
          const res = await fetch('/api/set_flags', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ action: action })
          });
          
          if (!res.ok) throw new Error(`서버 응답 에러: ${res.status}`);

          const data = await res.json();
          if (data.status === 'success') {
            // 버튼 불빛 업데이트
            updateUI(data.active_mode);

            if (data.active_mode === 'STANDBY') {
              addLog('RESET', 'FLAG_RESET'); // 리셋일 때 출력할 메시지
            } else {
              addLog(data.active_mode, 'FLAG_SET');
            }
          }
        } catch (e) {
          console.error("통신 실패:", e);
          alert("서 r버와 통신할 수 없습니다: " + e.message);
        }
      };
    } else {
      console.error(`버튼을 찾을 수 없음: ${id}`);
    }
  });

  function updateUI(mode) {
    // 모든 불빛 끄기
    ['modeI', 'modeD', 'modeU'].forEach(id => {
      const btn = document.getElementById(id);
      btn.classList.remove('active-i', 'active-d', 'active-u');
    });

    // 상단 배지 업데이트
    const badge = document.getElementById('modeBadge');
    badge.textContent = (mode === 'STANDBY' ? 'STANDBY' : mode);
    badge.className = 'badge' + (mode !== 'STANDBY' ? ' on' : '');

    // 선택된 버튼 불빛 켜기
    if (mode === 'I') document.getElementById('modeI').classList.add('active-i');
    if (mode === 'D') document.getElementById('modeD').classList.add('active-d');
    if (mode === 'U') document.getElementById('modeU').classList.add('active-u');
  }
});

// action 함수
async function sendAction(actionCode) {
    // 클릭된 버튼 요소 가져오기
    const btnElement = event.currentTarget;

    try {
        const response = await fetch('/api/set_action', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ action: actionCode })
        });

        const result = await response.json();

        if (result.status === 'success') {
            // 모든 액션 버튼의 'active' 클래스 제거 (불 끄기)
            document.querySelectorAll('.action-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // 방금 누른 버튼만 'active' 클래스 추가 (불 켜기)
            btnElement.classList.add('active');
            
            console.log("플래그 변경 성공:", result.flags);
        } else {
            alert("플래그 변경 실패: " + result.message);
        }
    } catch (error) {
        console.error("네트워크 오류:", error);
    }
}

</script>
</body>
</html>
